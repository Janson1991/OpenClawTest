version: '3.8'

services:
  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sku_qdrant
    ports:
      - "6333:6333"   # HTTP REST / Web UI
      - "6334:6334"   # gRPC（.NET SDK 使用）
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: sku_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # .NET API（生产环境取消注释）
  # api:
  #   build:
  #     context: ./src/Api
  #     dockerfile: Dockerfile
  #   ports:
  #     - "5000:8080"
  #   environment:
  #     ConnectionStrings__MySQL: "Server=host.docker.internal;..."
  #     ConnectionStrings__Redis: "redis:6379"
  #     Qdrant__Host: "qdrant"
  #   depends_on:
  #     - qdrant
  #     - redis

volumes:
  qdrant_storage:
  redis_data:
